<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopLite - Shopping Cart</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">ShopLite</a>
            <button class="hamburger" id="hamburger-btn">
                <img class="menu-icon" src="assets/icons/menu-bar.png" alt="Menu">
                <img class="close-icon" src="assets/icons/cross.png" alt="Close">
            </button>
            <ul class="nav-menu" id="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="product.html">Products</a></li>
                <li><a href="cart.html">Cart</a></li>
                <li><a href="register.html">Register</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>Shopping Cart</h1>
        <section class="cart-content">
            <div class="table-wrapper">
                <table border="1" cellpadding="10" cellspacing="0" style="width: 100%;">
                    <thead>
                        <tr>
                            <th>Sản phẩm</th>
                            <th>Giá</th>
                            <th>Số lượng</th>
                            <th>Tổng</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="cart-items">
                        <tr><td colspan="5" style="text-align: center; padding: 2rem;">Đang tải giỏ hàng...</td></tr>
                    </tbody>
                </table>
            </div>
            <h2>Tổng tiền: <span id="cart-total">$0.00</span></h2>
            <a href="product.html"><button>Tiếp tục mua sắm</button></a>
            <button onclick="checkout()">Thanh toán</button>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 ShopLite. All rights reserved.</p>
        <p>Email: info@shoplite.com | Phone: 123-456-7890</p>
    </footer>

    <script src="js/utils.js"></script>
    <script src="js/menu.js"></script>
    <script src="js/cart.js"></script>
</body>
</html>
